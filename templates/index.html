{% extends "base.html" %}
{% block content %}

<h2 class="mb-4">上传任务列表</h2>

{% for task in tasks %}
<div class="card mb-3 shadow-sm">
    <div class="card-body">
        <h4>{{ task.title }}</h4>
        <p>{{ task.description }}</p>

        <a href="/task/{{ task.id }}" class="btn btn-primary">
            查看详情
        </a>
    </div>
</div>
{% endfor %}

{% endblock %}

{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-body">
                <h3 class="mb-4">登录</h3>

                <form method="POST">
                    <input type="text" name="username" class="form-control mb-3" placeholder="用户名" required>
                    <input type="password" name="password" class="form-control mb-3" placeholder="密码" required>

                    <button class="btn btn-primary w-100">
                        登录
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
